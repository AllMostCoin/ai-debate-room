<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Debate Room</title>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div id="chat-panel">
      <div id="chat-header">
        <h2>AI Debate Room</h2>
        <div id="model-status"></div>
      </div>
      
      <div id="chat-messages"></div>
      
      <div id="chat-input-area">
        <input type="text" id="question-input" placeholder="Ask the AI models a question..." />
        <button id="voice-toggle">🎤</button>
        <button id="send-btn">Send</button>
      </div>
      
      <div id="model-selector">
        <h3>Active Models</h3>
        <div id="model-list"></div>
        <button id="add-model-btn">+ Add Model</button>
      </div>
    </div>
    
    <div id="debate-panel">
      <h3>Debate Mode</h3>
      <div id="debate-status"></div>
      <button id="start-debate-btn">Start Debate</button>
      <div id="debate-log"></div>
    </div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
